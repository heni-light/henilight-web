<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #1a1a2e; /* ጥቁር ሰማያዊ ዳራ */
            color: white; /* ነጭ ጽሁፍ */
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .box {
            background-color: #16213e;
            border: 2px solid #0f3460;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
        }
        h1 { color: #e94560; }
        a { color: #4db8ff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Henilight Web</h1>
        <p>እንኳን ወደ ዌብሳይቴ በሰላም መጣችሁ!</p>
        <p>ይህ በዋቸሞ ዩኒቨርሲቲ የ IT ተማሪ ሆኜ የሰራሁት የመጀመሪያው ድረ-ገጽ ነው።</p>
        <hr>
        <p>የሰራኋቸውን ፕሮጀክቶች ለማየት በቅርብ ይጠብቁ!</p>
    </div>
</body>
</html>
